name: Unpack Zip

on:
  push:
    paths:
      - 'smali.zip'
  workflow_dispatch:

jobs:
  unpack:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unpack smali.zip to root
        run: |
          unzip -o smali.zip -d .
          rm smali.zip

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Unpack smali.zip to root"
          git push
